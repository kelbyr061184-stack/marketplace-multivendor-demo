{% extends "base.html" %}
{% load i18n %}

{% block title %}Registro{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Registrarse</h2>
        <p>¿Ya tienes cuenta? <a href="{% url 'account_login' %}">Inicia sesión</a>.</p>

        <form class="signup" method="POST" action="{% url 'account_signup' %}">
            {% csrf_token %}
            {{ form.as_p }}
            {% if redirect_field_value %}
                <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
            {% endif %}
            <button class="btn btn-primary" type="submit">{% trans "Registrarse" %}</button>
        </form>
    </div>
</div>
{% endblock %}
